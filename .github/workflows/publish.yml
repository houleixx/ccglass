name: Publish to npm

# Auto-publish whenever a version tag (e.g. v0.2.1) is pushed.
# Create one with:  npm run release   (bumps patch, tags, pushes)
on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - run: npm install --no-audit --no-fund
      - run: npm test
      - run: npm publish --access public
        env:
          # An npm automation/granular token stored as a repo secret.
          # CI publishes bypass interactive 2FA.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
